<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — DestineAI</title>
  <meta name="description" content="Entre na sua conta e destine seu IR para a cultura brasileira.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/destineai.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .form { display: none; }
    .form.active { display: block; }
    .tab { border-bottom: 3px solid transparent; transition: all 0.25s; }
    .tab.active { border-bottom-color: #0D1B3E; color: #0D1B3E; }
    .field { width: 100%; padding: 14px 16px; border: 2px solid #E5E7EB; border-radius: 12px; font-size: 15px; font-family: 'Inter', sans-serif; transition: border-color 0.2s; }
    .field:focus { outline: none; border-color: #0D1B3E; }
    .field.error { border-color: #DC2626; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(13,27,62,0.3); border-top-color: #0D1B3E; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #alert.alert-error { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; border-radius: 10px; }
    #alert.alert-success { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; border-radius: 10px; }
  </style>
</head>
<body class="min-h-screen bg-[#0D1B3E] flex items-center justify-center p-5">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">

    <!-- Header -->
    <div class="bg-[#0D1B3E] px-8 py-8 text-center">
      <a href="index.html" class="inline-block mb-3">
        <span class="text-2xl font-bold text-white tracking-tight">Destine<span class="text-[#FFD700]">AI</span></span>
      </a>
      <p class="text-white/70 text-sm">Destine seu IR para a cultura brasileira</p>
    </div>

    <!-- Tabs -->
    <div class="flex border-b border-gray-100">
      <div class="tab flex-1 py-4 text-center cursor-pointer font-semibold text-gray-400 text-sm active" data-tab="login">
        <i class="fas fa-sign-in-alt mr-1.5"></i> Entrar
      </div>
      <div class="tab flex-1 py-4 text-center cursor-pointer font-semibold text-gray-400 text-sm" data-tab="register">
        <i class="fas fa-user-plus mr-1.5"></i> Cadastrar
      </div>
    </div>

    <!-- Forms -->
    <div class="px-8 py-7">
      <div id="alert" class="hidden mb-5 px-4 py-3 text-sm font-medium"></div>

      <!-- Login Form -->
      <form id="loginForm" class="form active" novalidate>
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">CPF ou Email</label>
          <input type="text" id="loginCpfEmail" class="field" placeholder="Digite seu CPF ou email" required>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Senha</label>
          <div class="relative">
            <input type="password" id="loginSenha" class="field" style="padding-right:48px" placeholder="Digite sua senha" required>
            <i class="fas fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer text-sm"
               onclick="togglePassword('loginSenha', this)"></i>
          </div>
        </div>
        <button type="submit" id="loginBtn"
                class="w-full bg-[#FFD700] hover:bg-[#FFC000] text-[#0D1B3E] font-bold py-4 rounded-xl text-base transition-colors">
          <span>Entrar</span>
        </button>
        <div class="text-center mt-4">
          <button type="button" onclick="showForgotPassword()"
                  class="text-sm text-gray-400 hover:text-[#0D1B3E] transition-colors underline underline-offset-2">
            Esqueceu sua senha?
          </button>
        </div>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="form" novalidate>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Nome completo *</label>
          <input type="text" id="regNome" class="field" placeholder="Seu nome completo" required>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">CPF *</label>
          <input type="text" id="regCpf" class="field" placeholder="000.000.000-00"
                 maxlength="14" inputmode="numeric" autocomplete="off" required>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Email *</label>
          <input type="email" id="regEmail" class="field" placeholder="seu@email.com" required>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Telefone</label>
          <input type="text" id="regPhone" class="field" placeholder="(00) 00000-0000"
                 maxlength="15" inputmode="numeric" autocomplete="tel">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Senha *</label>
          <div class="relative">
            <input type="password" id="regSenha" class="field" style="padding-right:48px" placeholder="Mínimo 8 caracteres" required>
            <i class="fas fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer text-sm"
               onclick="togglePassword('regSenha', this)"></i>
          </div>
        </div>
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Confirmar senha *</label>
          <div class="relative">
            <input type="password" id="regSenhaConfirm" class="field" style="padding-right:48px" placeholder="Repita a senha" required>
            <i class="fas fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer text-sm"
               onclick="togglePassword('regSenhaConfirm', this)"></i>
          </div>
        </div>
        <div class="mb-6">
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" id="regTerms" class="mt-1 w-4 h-4 rounded cursor-pointer" style="accent-color:#0D1B3E">
            <span class="text-sm text-gray-600 leading-relaxed">
              Li e aceito a
              <a href="politica-privacidade.html" target="_blank" class="text-[#0D1B3E] font-semibold hover:underline">Política de Privacidade</a>
              e os
              <a href="termos-uso.html" target="_blank" class="text-[#0D1B3E] font-semibold hover:underline">Termos de Uso</a> *
            </span>
          </label>
          <p id="termsError" class="text-red-600 text-xs mt-1.5 hidden">Você deve aceitar os termos para continuar</p>
        </div>
        <button type="submit" id="registerBtn"
                class="w-full bg-[#FFD700] hover:bg-[#FFC000] text-[#0D1B3E] font-bold py-4 rounded-xl text-base transition-colors">
          <span>Criar conta</span>
        </button>
      </form>

      <a href="piloto.html" class="flex items-center justify-center gap-2 mt-5 text-gray-400 hover:text-[#0D1B3E] text-sm transition-colors">
        <i class="fas fa-arrow-left text-xs"></i> Voltar para o início
      </a>

      <div class="mt-4 text-center text-xs text-gray-300">
        <a href="politica-privacidade.html" class="hover:text-gray-500 transition-colors">Política de Privacidade</a>
        <span class="mx-2">|</span>
        <a href="termos-uso.html" class="hover:text-gray-500 transition-colors">Termos de Uso</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/toast.js?v=6"></script>
  <script>
    // Se já logado, redirecionar
    if (auth.isLoggedIn()) {
      const isDemo = utils.getQueryParam('demo') === 'true';
      const defaultRedirect = isDemo
        ? 'destinar-rouanet.html?pronac=261847&titulo=Orquestra%20das%20Periferias%20do%20DF'
        : 'dashboard.html';
      const redirect = utils.getQueryParam('redirect') || defaultRedirect;
      window.location.href = redirect;
    }

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
        hideAlert();
      });
    });

    // Abrir aba de cadastro automaticamente se ?tab=register na URL
    if (utils.getQueryParam('tab') === 'register') {
      document.querySelector('[data-tab="register"]')?.click();
    }

    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function showAlert(message, type = 'error') {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = `block mb-5 px-4 py-3 text-sm font-medium alert-${type}`;
    }

    function hideAlert() {
      const alert = document.getElementById('alert');
      alert.className = 'hidden mb-5 px-4 py-3 text-sm font-medium';
    }

    function setLoading(btn, loading) {
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner mr-2"></span> Aguarde...';
        btn.classList.add('opacity-80');
      } else {
        btn.disabled = false;
        btn.classList.remove('opacity-80');
        btn.innerHTML = '<span>' + (btn.id === 'loginBtn' ? 'Entrar' : 'Criar conta') + '</span>';
      }
    }

    function showForgotPassword() {
      Toast.info(
        'Envie um e-mail para <strong>contato@destineai.com.br</strong> com o CPF cadastrado e redefiniremos sua senha em até 24h.',
        'Recuperação de senha'
      );
    }

    const cpfField = document.getElementById('regCpf');
    ['input', 'keyup'].forEach(evt => {
      cpfField.addEventListener(evt, function() {
        const el = this;
        requestAnimationFrame(() => utils.maskCPF(el));
      });
    });

    const phoneField = document.getElementById('regPhone');
    ['input', 'keyup'].forEach(evt => {
      phoneField.addEventListener(evt, function() {
        const el = this;
        requestAnimationFrame(() => utils.maskPhone(el));
      });
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const cpfEmail = document.getElementById('loginCpfEmail').value.trim();
      const senha = document.getElementById('loginSenha').value;
      const btn = document.getElementById('loginBtn');

      if (!cpfEmail || !senha) {
        showAlert('Preencha todos os campos');
        return;
      }

      setLoading(btn, true);

      try {
        const isEmail = cpfEmail.includes('@');
        const credentials = isEmail
          ? { email: cpfEmail, senha }
          : { cpf: utils.cleanCPF(cpfEmail), senha };

        let response;
        try {
          response = await api.login(credentials);
        } catch (apiError) {
          if (apiError.message === 'Erro de conexão com o servidor' || apiError.status === 500) {
            const isAdminDemo = cpfEmail.toLowerCase().startsWith('admin@');
            response = {
              token: 'demo_token_' + Date.now(),
              user: {
                id: 1,
                nome: cpfEmail.includes('@') ? cpfEmail.split('@')[0] : 'Usuário Demo',
                email: cpfEmail.includes('@') ? cpfEmail : 'demo@destineai.com.br',
                cpf: cpfEmail.includes('@') ? '00000000000' : utils.cleanCPF(cpfEmail),
                total_donated: 0,
                is_admin: isAdminDemo
              }
            };
          } else {
            throw apiError;
          }
        }

        auth.setToken(response.token);
        auth.setUser(response.user);
        Toast.success('Redirecionando...', 'Login realizado!');

        const isDemo = utils.getQueryParam('demo') === 'true';
        const defaultRedirect = isDemo
          ? 'destinar-rouanet.html?pronac=261847&titulo=Orquestra%20das%20Periferias%20do%20DF'
          : 'dashboard.html';
        const redirect = utils.getQueryParam('redirect') || defaultRedirect;
        setTimeout(() => window.location.href = redirect, 1000);

      } catch (error) {
        Toast.error(error.message || 'Verifique suas credenciais e tente novamente.', 'Erro no login');
      } finally {
        setLoading(btn, false);
      }
    });

    // Cadastro
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const nome = document.getElementById('regNome').value.trim();
      const cpf = utils.cleanCPF(document.getElementById('regCpf').value);
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.replace(/\D/g, '');
      const senha = document.getElementById('regSenha').value;
      const senhaConfirm = document.getElementById('regSenhaConfirm').value;
      const acceptedTerms = document.getElementById('regTerms').checked;
      const btn = document.getElementById('registerBtn');

      if (nome.length < 3) {
        Toast.warning('Preencha seu nome completo (mínimo 3 caracteres).', 'Nome obrigatório');
        return;
      }
      if (!utils.isValidCPF(cpf)) {
        Toast.warning('O CPF informado não é válido. Verifique os 11 dígitos e tente novamente.', 'CPF inválido');
        return;
      }
      if (!utils.isValidEmail(email)) {
        Toast.warning('O e-mail informado não é válido. Exemplo correto: seunome@gmail.com', 'E-mail inválido');
        return;
      }
      if (senha.length < 8) {
        Toast.warning('A senha precisa ter pelo menos 8 caracteres. Tente algo como: Nome@2026', 'Senha muito curta');
        return;
      }
      if (senha !== senhaConfirm) {
        Toast.warning('A confirmação de senha não confere com a senha digitada. Verifique e tente novamente.', 'Senhas não coincidem');
        return;
      }
      if (!acceptedTerms) {
        Toast.warning('É necessário aceitar a Política de Privacidade e os Termos de Uso para continuar.', 'Aceite os termos');
        document.getElementById('termsError').classList.remove('hidden');
        return;
      }
      document.getElementById('termsError').classList.add('hidden');

      setLoading(btn, true);

      try {
        await api.register({ nome, cpf, email, phone, senha, accepted_terms: true });
        Toast.success('Conta criada! Entrando automaticamente...', 'Bem-vindo!');

        // Auto-login após cadastro
        try {
          const loginResp = await api.login({ email, senha });
          auth.setToken(loginResp.token);
          auth.setUser(loginResp.user);
          const redirect = utils.getQueryParam('redirect') || 'dashboard.html';
          setTimeout(() => window.location.href = redirect, 1000);
        } catch {
          // Fallback: redirecionar para aba de login com email preenchido
          setTimeout(() => {
            document.querySelector('.tab[data-tab="login"]').click();
            document.getElementById('loginCpfEmail').value = email;
          }, 800);
        }
      } catch (error) {
        Toast.error(error.message || 'Não foi possível criar sua conta. Tente novamente.', 'Erro no cadastro');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
  <script src="js/layout.js"></script>
  <script>Layout.init('', { skipNav: true, skipFooter: true });</script>
  <script src="js/tenant.js"></script>
  <script>
    // Modo demo: ?demo=true auto-preenche credenciais e faz login real
    if (utils.getQueryParam('demo') === 'true') {
      const banner = document.createElement('div');
      banner.style.cssText = 'background:#FFD700;color:#0D1B3E;text-align:center;font-size:12px;font-weight:700;padding:8px 16px;letter-spacing:0.05em;';
      banner.textContent = 'PILOTO FGV · Entrando com conta de demonstração...';
      document.body.insertBefore(banner, document.body.firstChild);

      document.getElementById('loginCpfEmail').value = 'demo@destineai.com.br';
      document.getElementById('loginSenha').value = 'Piloto2026';

      setTimeout(() => {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }, 800);
    }
  </script>
<script src="js/tina.js"></script>
</body>
</html>
