<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IncentivaBR — Pitch FGV MBA 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --navy:#0D1B2A; --navy-mid:#1A2F45; --blue:#1565C0; --blue-light:#1E88E5;
    --gold:#F5A623; --gold-light:#FFD54F; --green:#2E7D32; --green-light:#43A047;
    --red:#C62828; --white:#FFFFFF; --gray-400:#9BA8B5; --gray-600:#5A6472;
    --accent:#7C3AED; --accent-light:#A78BFA;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);overflow:hidden;height:100vh;width:100vw;}
  .deck{width:100vw;height:100vh;position:relative;}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .5s ease,transform .5s ease;transform:translateX(40px);overflow:hidden;}
  .slide.active{opacity:1;pointer-events:all;transform:translateX(0);}
  .slide.prev{opacity:0;transform:translateX(-40px);}
  .nav-bar{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.08);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:10px 20px;z-index:1000;}
  .nav-bar button{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:8px;transition:all .2s;}
  .nav-bar button:hover{color:var(--white);background:rgba(255,255,255,.1);}
  .nav-bar button:disabled{opacity:.2;cursor:default;}
  .nav-dots{display:flex;gap:7px;align-items:center;}
  .nav-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .3s;}
  .nav-dot.active{background:var(--gold);width:20px;border-radius:4px;}
  .slide-counter{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);min-width:40px;text-align:center;}
  .slide-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:16px;}
  .tag-red{background:rgba(198,40,40,.2);color:#EF9A9A;border:1px solid rgba(198,40,40,.4);}
  .tag-blue{background:rgba(21,101,192,.2);color:#90CAF9;border:1px solid rgba(21,101,192,.4);}
  .tag-gold{background:rgba(245,166,35,.2);color:#FFD54F;border:1px solid rgba(245,166,35,.4);}
  .tag-green{background:rgba(46,125,50,.2);color:#A5D6A7;border:1px solid rgba(46,125,50,.4);}
  .tag-purple{background:rgba(124,58,237,.2);color:#C4B5FD;border:1px solid rgba(124,58,237,.4);}
  .tag-teal{background:rgba(0,121,107,.2);color:#80CBC4;border:1px solid rgba(0,121,107,.4);}
  .slide-h2{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,40px);font-weight:700;line-height:1.2;margin-bottom:10px;}
  .slide-lead{font-size:clamp(13px,1.3vw,17px);color:rgba(255,255,255,.65);line-height:1.6;max-width:560px;}
  em.hl{color:var(--gold);font-style:normal;font-weight:700;}
  em.hl-blue{color:#90CAF9;font-style:normal;font-weight:700;}
  em.hl-green{color:#A5D6A7;font-style:normal;font-weight:700;}
  em.hl-red{color:#EF9A9A;font-style:normal;font-weight:700;}
  .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px 24px;}
  .card-accent-gold{border-left:4px solid var(--gold);}
  .card-accent-blue{border-left:4px solid var(--blue-light);}
  .card-accent-green{border-left:4px solid var(--green-light);}
  .card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:8px;}
  .stat-row{display:flex;gap:16px;flex-wrap:wrap;}
  .stat-item{flex:1;min-width:100px;background:rgba(255,255,255,.05);border-radius:12px;padding:14px 16px;border:1px solid rgba(255,255,255,.08);}
  .stat-n{font-family:'Playfair Display',serif;font-size:clamp(20px,2.5vw,30px);font-weight:700;color:var(--gold);}
  .stat-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
  .badge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;}
  .badge-gold{background:rgba(245,166,35,.2);color:#FFD54F;}
  .badge-green{background:rgba(46,125,50,.2);color:#A5D6A7;}
  .badge-red{background:rgba(198,40,40,.2);color:#EF9A9A;}
  .badge-blue{background:rgba(21,101,192,.2);color:#90CAF9;}
  .badge-purple{background:rgba(124,58,237,.2);color:#C4B5FD;}
  .badge-gray{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);}
  table.pitch-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.pitch-table th{background:rgba(255,255,255,.08);padding:9px 14px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:600;}
  table.pitch-table td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.85);vertical-align:top;}
  table.pitch-table tr:last-child td{border-bottom:none;}
  .slide-inner{flex:1;display:flex;flex-direction:column;padding:clamp(24px,3.5vh,50px) clamp(32px,5vw,88px) 80px;max-width:1300px;margin:0 auto;width:100%;overflow:hidden;}
  .slide-inner.wide{max-width:1440px;}
  .slide-header{margin-bottom:18px;}
  .slide-content{flex:1;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
  .gap-section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:10px;}
  .key-hint{position:fixed;top:20px;right:24px;font-size:11px;color:rgba(255,255,255,.2);display:flex;align-items:center;gap:8px;z-index:999;}
  .key-hint kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:2px 8px;font-size:11px;color:rgba(255,255,255,.35);}

  /* SLIDE 1 — CAPA */
  #slide-1{background:radial-gradient(ellipse at 60% 40%,rgba(21,101,192,.35) 0%,transparent 65%),radial-gradient(ellipse at 10% 80%,rgba(124,58,237,.2) 0%,transparent 55%),var(--navy);justify-content:center;align-items:center;text-align:center;}
  .cover-top{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:28px;}
  .cover-logo{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
  .cover-h1{font-family:'Playfair Display',serif;font-size:clamp(34px,5.5vw,68px);font-weight:800;line-height:1.08;margin-bottom:20px;max-width:820px;}
  .cover-tagline{font-size:clamp(14px,1.5vw,19px);color:rgba(255,255,255,.6);max-width:580px;line-height:1.6;margin-bottom:36px;}
  .cover-meta{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;}
  .cover-meta-item{font-size:12px;color:rgba(255,255,255,.4);}
  .cover-meta-item strong{display:block;font-size:13px;color:rgba(255,255,255,.75);margin-bottom:2px;}
  .cover-float{position:absolute;inset:0;pointer-events:none;}
  .float-card{position:absolute;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px 18px;backdrop-filter:blur(8px);font-size:13px;font-weight:600;}
  .fc1{top:18%;left:4%;}  .fc2{top:22%;right:4%;}  .fc3{bottom:22%;left:5%;}  .fc4{bottom:22%;right:5%;}

  /* SLIDE 2 — DOR */
  #slide-2{background:radial-gradient(ellipse at 80% 20%,rgba(198,40,40,.2) 0%,transparent 60%),var(--navy);}
  .dor-main{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
  .big-number{font-family:'Playfair Display',serif;font-size:clamp(44px,7vw,86px);font-weight:800;color:var(--gold);line-height:1;}
  .big-label{font-size:13px;color:rgba(255,255,255,.55);margin-top:4px;max-width:270px;line-height:1.4;}
  .dor-quote{margin-top:20px;padding:14px 18px;background:rgba(198,40,40,.12);border-left:4px solid #EF5350;border-radius:0 12px 12px 0;font-size:13px;font-style:italic;color:rgba(255,255,255,.8);line-height:1.5;}
  .barriers{display:flex;flex-direction:column;gap:7px;}
  .barrier-item{display:flex;align-items:center;gap:10px;padding:9px 13px;background:rgba(255,255,255,.04);border-radius:9px;border:1px solid rgba(255,255,255,.07);font-size:12px;color:rgba(255,255,255,.8);}
  .b-num{width:22px;height:22px;border-radius:50%;background:rgba(198,40,40,.25);color:#EF9A9A;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  /* SLIDE 3 — STAKEHOLDERS */
  #slide-3{background:radial-gradient(ellipse at 20% 80%,rgba(124,58,237,.18) 0%,transparent 55%),var(--navy);}
  .b2b2c-diagram{display:flex;align-items:center;margin:12px 0 20px;}
  .b2b2c-node{flex:1;text-align:center;padding:13px 8px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);}
  .node-icon{font-size:20px;margin-bottom:5px;}
  .node-name{font-size:12px;font-weight:700;margin-bottom:2px;}
  .node-sub{font-size:10px;color:rgba(255,255,255,.4);line-height:1.3;}
  .b2b2c-node.highlight-node{background:rgba(21,101,192,.2);border-color:rgba(21,101,192,.5);}
  .b2b2c-arrow{flex-shrink:0;width:36px;text-align:center;color:var(--gold);font-size:16px;}
  .stakeholder-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;}
  .sh-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:11px;text-align:center;}
  .sh-icon{font-size:18px;margin-bottom:5px;}
  .sh-name{font-size:11px;font-weight:700;margin-bottom:2px;}
  .sh-role{font-size:10px;color:rgba(255,255,255,.4);line-height:1.3;}
  .pilot-box{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:11px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:18px;}
  .pilot-icon{font-size:26px;}
  .pilot-label{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;}
  .pilot-name{font-size:15px;font-weight:700;color:var(--gold);}
  .pilot-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}

  /* SLIDE 4 — KPIs */
  #slide-4{background:radial-gradient(ellipse at 70% 30%,rgba(21,101,192,.2) 0%,transparent 55%),var(--navy);}
  .pn-versions{display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
  .pn-item{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-radius:9px;border:1px solid transparent;font-size:12px;color:rgba(255,255,255,.5);}
  .pn-item.selected{background:rgba(21,101,192,.15);border-color:rgba(21,101,192,.4);color:rgba(255,255,255,.9);}
  .pn-badge{flex-shrink:0;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;margin-top:1px;}
  .kpi-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .kpi-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:16px 18px;text-align:center;}
  .kpi-card.primary-kpi{background:rgba(21,101,192,.15);border-color:rgba(21,101,192,.4);}
  .kpi-icon{font-size:18px;margin-bottom:7px;}
  .kpi-value{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gold);}
  .kpi-label{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px;}
  .kpi-baseline{font-size:10px;color:rgba(255,255,255,.3);margin-top:5px;}
  .hypothesis-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
  .hyp-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:13px 15px;}
  .hyp-tag{font-size:10px;font-weight:700;color:var(--accent-light);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
  .hyp-text{font-size:12px;color:rgba(255,255,255,.75);line-height:1.5;}
  .hyp-metric{font-size:11px;color:var(--gold-light);margin-top:7px;font-weight:600;}

  /* SLIDE 5 — DADOS */
  #slide-5{background:radial-gradient(ellipse at 30% 70%,rgba(0,121,107,.15) 0%,transparent 55%),var(--navy);}

  /* SLIDE 6 — LACUNAS */
  #slide-6{background:radial-gradient(ellipse at 80% 30%,rgba(245,166,35,.12) 0%,transparent 55%),var(--navy);}
  .gap-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .gap-item{display:flex;align-items:flex-start;gap:9px;margin-bottom:9px;font-size:12px;color:rgba(255,255,255,.75);line-height:1.4;}
  .gap-ico{flex-shrink:0;margin-top:1px;font-size:13px;}
  .mitig-card{background:rgba(46,125,50,.1);border:1px solid rgba(46,125,50,.3);border-radius:9px;padding:11px 14px;font-size:12px;color:rgba(255,255,255,.75);line-height:1.5;margin-top:7px;}
  .mitig-card strong{color:#A5D6A7;}

  /* SLIDE 7 — LGPD */
  #slide-7{background:radial-gradient(ellipse at 20% 30%,rgba(198,40,40,.15) 0%,transparent 55%),var(--navy);}
  .risk-matrix{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .risk-item{background:rgba(255,255,255,.04);border-radius:11px;padding:13px 15px;border:1px solid rgba(255,255,255,.07);}
  .risk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .risk-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.9);}
  .risk-chips{display:flex;gap:5px;}
  .risk-mitig{font-size:11px;color:rgba(255,255,255,.5);line-height:1.4;}
  .risk-mitig strong{color:#A5D6A7;font-weight:600;}
  .lgpd-principles{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:14px;}
  .lgpd-p{background:rgba(21,101,192,.1);border:1px solid rgba(21,101,192,.25);border-radius:9px;padding:11px;text-align:center;font-size:11px;color:rgba(255,255,255,.7);}
  .lgpd-icon{font-size:17px;margin-bottom:5px;}
  .lgpd-name{font-weight:700;color:#90CAF9;display:block;margin-bottom:3px;}

  /* SLIDE 8 — SOLUÇÃO */
  #slide-8{background:radial-gradient(ellipse at 80% 60%,rgba(21,101,192,.2) 0%,transparent 60%),var(--navy);}
  .arch-layers{display:flex;flex-direction:column;gap:5px;}
  .arch-layer{display:flex;align-items:center;gap:12px;padding:8px 14px;border-radius:7px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);font-size:12px;color:rgba(255,255,255,.75);}
  .al-icon{font-size:15px;flex-shrink:0;width:26px;text-align:center;}
  .al-name{font-weight:700;color:rgba(255,255,255,.9);width:190px;flex-shrink:0;}
  .al-detail{color:rgba(255,255,255,.45);font-size:11px;}
  .why-not-ecac{background:rgba(46,125,50,.1);border:1px solid rgba(46,125,50,.3);border-radius:11px;padding:14px 16px;}
  .why-not-title{font-size:11px;font-weight:700;color:#A5D6A7;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:7px;}
  .why-row{display:flex;flex-wrap:wrap;gap:7px;}
  .why-chip{background:rgba(255,255,255,.06);border-radius:20px;padding:4px 11px;font-size:11px;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1);}
  .ai-row{display:flex;flex-direction:column;gap:7px;margin-top:13px;}
  .ai-item{display:flex;align-items:center;gap:9px;font-size:12px;padding:8px 11px;background:rgba(255,255,255,.04);border-radius:7px;border:1px solid rgba(255,255,255,.07);}
  .ai-type{font-weight:700;width:105px;flex-shrink:0;}
  .ai-desc{color:rgba(255,255,255,.6);}

  /* SLIDE 9 — VALIDAÇÃO */
  #slide-9{background:radial-gradient(ellipse at 60% 70%,rgba(124,58,237,.15) 0%,transparent 55%),var(--navy);}
  .pilot-details{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;}
  .pilot-timeline{position:relative;padding-left:22px;}
  .pilot-timeline::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:2px;background:rgba(255,255,255,.1);}
  .pt-item{position:relative;margin-bottom:13px;}
  .pt-item::before{content:'';position:absolute;left:-20px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid var(--navy);}
  .pt-period{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;}
  .pt-desc{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px;line-height:1.4;}
  .success-criteria{display:flex;flex-direction:column;gap:9px;}
  .sc-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:rgba(255,255,255,.05);border-radius:9px;border:1px solid rgba(255,255,255,.08);}
  .sc-metric{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--gold);min-width:64px;}
  .sc-label{font-size:12px;color:rgba(255,255,255,.65);line-height:1.3;}
  .sc-label strong{color:rgba(255,255,255,.9);display:block;margin-bottom:2px;}
  .demo-link-box{margin-top:14px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.35);border-radius:11px;padding:13px 16px;display:flex;align-items:center;gap:12px;}
  .dl-icon{font-size:20px;}
  .dl-text{font-size:12px;color:rgba(255,255,255,.7);}
  .dl-text strong{color:#C4B5FD;display:block;margin-bottom:2px;font-size:13px;}
  .demo-links{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px;}
  .demo-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#C4B5FD;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:4px 11px;text-decoration:none;transition:all .2s;}
  .demo-link:hover{background:rgba(124,58,237,.3);}

  /* SLIDE 10 — ROADMAP */
  #slide-10{background:radial-gradient(ellipse at 50% 50%,rgba(21,101,192,.2) 0%,transparent 65%),var(--navy);}
  .roadmap-waves{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px;margin-bottom:18px;}
  .wave-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:15px;text-align:center;position:relative;overflow:hidden;}
  .wave-card::before{content:attr(data-wave);position:absolute;top:-8px;right:-4px;font-size:46px;font-weight:900;color:rgba(255,255,255,.04);font-family:'Playfair Display',serif;line-height:1;}
  .wc-wave{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:5px;}
  .wc-year{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--gold);}
  .wc-scope{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px;line-height:1.3;}
  .wc-potential{font-size:12px;font-weight:700;color:#A5D6A7;margin-top:7px;}
  .roi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px;}
  .roi-card{background:rgba(255,255,255,.04);border-radius:11px;padding:13px 15px;border:1px solid rgba(255,255,255,.08);}
  .roi-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);margin-bottom:5px;}
  .roi-value{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
  .roi-detail{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
  .team-row{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;}
  .team-item{background:rgba(255,255,255,.04);border-radius:9px;padding:9px;text-align:center;border:1px solid rgba(255,255,255,.07);}
  .ti-role{color:rgba(255,255,255,.9);font-weight:700;margin-bottom:2px;font-size:11px;}
  .ti-status{font-size:10px;}

  /* SLIDE 11 — ENCERRAMENTO */

  <button id="btn-next" onclick="navigate(1)"><i class="fas fa-chevron-right"></i></button>
  <div class="slide-counter" id="counter">1 / 11</div>
</nav>

<script>
// ── RENDER ────────────────────────────────────────────────────────────
const deck = document.getElementById('deck');

function slide(id, extraClass, bg, content) {
  const d = document.createElement('div');
  d.className = 'slide' + (extraClass ? ' ' + extraClass : '');
  d.id = 'slide-' + id;
  if (bg) d.style.background = bg;
  d.innerHTML = content;
  deck.appendChild(d);
}

function inner(content, wide) {
  return `<div class="slide-inner${wide?' wide':''}">${content}</div>`;
}

function tag(cls, icon, label) {
  return `<div class="slide-tag ${cls}"><i class="fas ${icon}"></i> ${label}</div>`;
}

// ── SLIDE 1 — CAPA ───────────────────────────────────────────────────

const floats = C.capa.floats.map(f =>
  `<div class="float-card ${f.pos}" style="color:${f.cor}"><i class="fas ${f.icone}"></i> ${f.texto}</div>`
).join('');

const autores = C.capa.autores.map(a =>
  `<div class="cover-meta-item"><strong>${a.nome}</strong>${a.papel}</div>`
).join('') + `<div class="cover-meta-item"><strong>${C.capa.professor.nome}</strong>${C.capa.professor.papel}</div>`;

slide(1, 'active', null, `
  <div class="cover-float">${floats}</div>

  <p class="cover-tagline">${C.capa.tagline}</p>

`);

// ── SLIDE 2 — DOR ────────────────────────────────────────────────────
const stats2 = C.dor.stats.map(s =>
  `<div class="stat-item"><div class="stat-n">${s.n}</div><div class="stat-label">${s.label}</div></div>`

const barriers = C.dor.barreiras.map((b, i) =>
  `<div class="barrier-item"><div class="b-num">${i+1}</div>${b}</div>`
).join('');

slide(2, '', null, inner(`
  <div class="slide-header">
    ${tag('tag-red','fa-heart-broken', C.dor.tag)}

    <div class="dor-main">

  </div>
`));

// ── SLIDE 3 — STAKEHOLDERS ───────────────────────────────────────────
const nodes = C.stakeholders.b2b2c.map((n, i) => {
  const arr = i < C.stakeholders.b2b2c.length - 1 ? `<div class="b2b2c-arrow"><i class="fas fa-arrow-right"></i></div>` : '';

const shs = C.stakeholders.stakeholders.map(s =>

slide(3, '', null, inner(`

// ── SLIDE 5 — DADOS ──────────────────────────────────────────────────

const camadas = C.solucao.camadas.map(c =>

const whyChips = C.solucao.porqueNaoEcac.map(w =>

const aiRows = C.solucao.tiposIA.map(a =>

          <div style="font-size:12px"><i class="fas fa-certificate" style="color:var(--gold);margin-right:6px"></i>${C.solucao.inpi}</div>

// ── SLIDE 9 — VALIDAÇÃO ──────────────────────────────────────────────
const timeline9 = C.validacao.timeline.map(t =>

const ondas = C.roadmap.ondas.map((o, i) =>

const closeStats = C.encerramento.stats.map(s =>

).join('');

  <div class="inpi-badge"><i class="fas fa-certificate"></i> ${C.encerramento.inpi}</div>
`);

// ── NAVEGAÇÃO ────────────────────────────────────────────────────────
const TOTAL = 11;
let current = 1;
const dotsEl = document.getElementById('dots');
const counter = document.getElementById('counter');

for (let i = 1; i <= TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i === 1 ? ' active' : '');
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
}

function goTo(n) {
  if (n < 1 || n > TOTAL || n === current) return;
  document.getElementById('slide-' + current).classList.remove('active');
  document.getElementById('slide-' + current).classList.add('prev');
  setTimeout(() => {
    const p = document.getElementById('slide-' + (n < current ? n+1 : n-1));
    if (p) p.classList.remove('prev');
  }, 500);
  document.getElementById('slide-' + n).classList.add('active');
  current = n;
  updateNav();
}

function navigate(dir) { goTo(current + dir); }

function updateNav() {
  document.getElementById('btn-prev').disabled = current === 1;
  document.getElementById('btn-next').disabled = current === TOTAL;
  counter.textContent = current + ' / ' + TOTAL;
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i+1 === current));
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') navigate(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') navigate(-1);
  if (e.key==='Home') goTo(1);
  if (e.key==='End')  goTo(TOTAL);
});

let sx = 0;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
document.addEventListener('touchend',   e => { if (Math.abs(e.changedTouches[0].clientX - sx) > 50) navigate(e.changedTouches[0].clientX < sx ? 1 : -1); });
</script>

</html>
