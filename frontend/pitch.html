<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IncentivaBR — Pitch FGV MBA 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* ── PALETA VIBRANTE ─────────────────────────────────────── */
  :root{
    --gold:#FBBF24; --gold-light:#FDE68A;
    --white:#FFFFFF;
    --g1a:#3B0764; --g1b:#1E3A8A;   /* capa: violeta → azul */
    --g2a:#7F1D1D; --g2b:#92400E;   /* dor: vermelho → âmbar */
    --g3a:#134E4A; --g3b:#1E3A8A;   /* stakeholders: teal → azul */
    --g4a:#1E1B4B; --g4b:#4C1D95;   /* kpis: índigo → violeta */
    --g5a:#1E3A8A; --g5b:#134E4A;   /* dados: azul → teal */
    --g6a:#78350F; --g6b:#7C2D12;   /* lacunas: âmbar → laranja */
    --g7a:#881337; --g7b:#7F1D1D;   /* lgpd: rosa → vinho */
    --g8a:#1E3A8A; --g8b:#312E81;   /* solução: azul → índigo */
    --g9a:#4C1D95; --g9b:#5B21B6;   /* validação: violeta */
    --g10a:#14532D;--g10b:#134E4A;  /* roadmap: verde → teal */
    --g11a:#312E81;--g11b:#4C1D95;  /* encerramento */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;color:#fff;overflow:hidden;height:100vh;width:100vw;}
  .deck{width:100vw;height:100vh;position:relative;}

  /* ── SLIDES ── */
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .45s ease,transform .45s ease;transform:translateX(36px);overflow:hidden;}
  .slide.active{opacity:1;pointer-events:all;transform:translateX(0);}
  .slide.prev{opacity:0;transform:translateX(-36px);}

  /* ── NAV ── */
  .nav-bar{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.35);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:9px 18px;z-index:1000;}
  .nav-bar button{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;padding:3px 7px;border-radius:7px;transition:all .2s;}
  .nav-bar button:hover{color:#fff;background:rgba(255,255,255,.15);}
  .nav-bar button:disabled{opacity:.2;cursor:default;}
  .nav-dots{display:flex;gap:6px;align-items:center;}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .3s;}
  .nav-dot.active{background:var(--gold);width:18px;border-radius:3px;}
  .slide-counter{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);min-width:36px;text-align:center;}

  /* ── TAGS ── */
  .slide-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 13px;border-radius:20px;margin-bottom:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);backdrop-filter:blur(4px);}

  /* ── TIPOGRAFIA ── */
  .slide-h2{font-family:'Playfair Display',serif;font-size:clamp(18px,2.2vw,30px);font-weight:700;line-height:1.2;margin-bottom:8px;}
  .slide-lead{font-size:clamp(12px,1.1vw,15px);color:rgba(255,255,255,.75);line-height:1.6;max-width:540px;}
  em.hl{color:var(--gold);font-style:normal;font-weight:700;}
  em.hl-blue{color:#BAE6FD;font-style:normal;font-weight:700;}
  em.hl-green{color:#BBF7D0;font-style:normal;font-weight:700;}
  em.hl-red{color:#FCA5A5;font-style:normal;font-weight:700;}

  /* ── CARDS ── */
  .card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:18px 22px;backdrop-filter:blur(6px);}
  .card-accent-gold{border-left:4px solid var(--gold);}
  .card-accent-blue{border-left:4px solid #60A5FA;}
  .card-accent-green{border-left:4px solid #34D399;}
  .gap-section-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px;}

  /* ── STATS ── */
  .stat-row{display:flex;gap:12px;flex-wrap:wrap;}
  .stat-item{flex:1;min-width:90px;background:rgba(255,255,255,.12);border-radius:11px;padding:12px 14px;border:1px solid rgba(255,255,255,.2);}
  .stat-n{font-family:'Playfair Display',serif;font-size:clamp(18px,2vw,26px);font-weight:700;color:var(--gold);}
  .stat-label{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;}

  /* ── BADGES ── */
  .badge{display:inline-block;padding:2px 8px;border-radius:9px;font-size:10px;font-weight:700;}
  .badge-gold{background:rgba(251,191,36,.25);color:#FDE68A;}
  .badge-green{background:rgba(52,211,153,.2);color:#A7F3D0;}
  .badge-red{background:rgba(239,68,68,.25);color:#FCA5A5;}
  .badge-blue{background:rgba(96,165,250,.2);color:#BFDBFE;}
  .badge-purple{background:rgba(167,139,250,.2);color:#DDD6FE;}
  .badge-gray{background:rgba(255,255,255,.1);color:rgba(255,255,255,.55);}

  /* ── TABLE ── */
  table.pitch-table{width:100%;border-collapse:collapse;font-size:12px;}
  table.pitch-table th{background:rgba(255,255,255,.12);padding:8px 12px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.6);font-weight:700;}
  table.pitch-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.88);vertical-align:top;}
  table.pitch-table tr:last-child td{border-bottom:none;}
  table.pitch-table tr:hover td{background:rgba(255,255,255,.05);}

  /* ── LAYOUT ── */
  .slide-inner{flex:1;display:flex;flex-direction:column;padding:clamp(20px,3vh,44px) clamp(28px,4.5vw,80px) 72px;max-width:1280px;margin:0 auto;width:100%;overflow:hidden;}
  .slide-inner.wide{max-width:1420px;}
  .slide-header{margin-bottom:14px;}
  .slide-content{flex:1;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
  .key-hint{position:fixed;top:16px;right:20px;font-size:10px;color:rgba(255,255,255,.25);display:flex;align-items:center;gap:6px;z-index:999;}
  .key-hint kbd{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:2px 7px;font-size:10px;color:rgba(255,255,255,.35);}

  /* ── SLIDE 1 — CAPA ── */
  #slide-1{background:linear-gradient(135deg,var(--g1a) 0%,var(--g1b) 100%);justify-content:center;align-items:center;text-align:center;}
  #slide-1::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 35%,rgba(139,92,246,.4) 0%,transparent 60%),radial-gradient(ellipse at 15% 75%,rgba(59,130,246,.3) 0%,transparent 50%);pointer-events:none;}
  .cover-top{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:24px;}
  .cover-logo{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px;}
  .cover-h1{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,54px);font-weight:800;line-height:1.1;margin-bottom:18px;max-width:780px;position:relative;}
  .cover-tagline{font-size:clamp(13px,1.2vw,16px);color:rgba(255,255,255,.7);max-width:560px;line-height:1.65;margin-bottom:32px;position:relative;}
  .cover-meta{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;position:relative;}
  .cover-meta-item{font-size:11px;color:rgba(255,255,255,.45);}
  .cover-meta-item strong{display:block;font-size:12px;color:rgba(255,255,255,.8);margin-bottom:1px;}
  .cover-float{position:absolute;inset:0;pointer-events:none;}
  .float-card{position:absolute;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:10px 16px;backdrop-filter:blur(12px);font-size:12px;font-weight:600;}
  .fc1{top:16%;left:3%;}  .fc2{top:20%;right:3%;}  .fc3{bottom:20%;left:4%;}  .fc4{bottom:20%;right:4%;}

  /* ── SLIDE 2 — DOR ── */
  #slide-2{background:linear-gradient(135deg,var(--g2a) 0%,var(--g2b) 100%);}
  #slide-2::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 15%,rgba(239,68,68,.35) 0%,transparent 55%);pointer-events:none;}
  .dor-main{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
  .big-number{font-family:'Playfair Display',serif;font-size:clamp(32px,4.5vw,56px);font-weight:800;color:var(--gold);line-height:1;}
  .big-label{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px;max-width:260px;line-height:1.4;}
  .dor-quote{margin-top:16px;padding:12px 16px;background:rgba(239,68,68,.2);border-left:4px solid #F87171;border-radius:0 10px 10px 0;font-size:12px;font-style:italic;color:rgba(255,255,255,.88);line-height:1.5;}
  .barriers{display:flex;flex-direction:column;gap:6px;}
  .barrier-item{display:flex;align-items:center;gap:9px;padding:8px 12px;background:rgba(255,255,255,.1);border-radius:8px;border:1px solid rgba(255,255,255,.15);font-size:11px;color:rgba(255,255,255,.88);}
  .b-num{width:20px;height:20px;border-radius:50%;background:rgba(239,68,68,.4);color:#FCA5A5;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  /* ── SLIDE 3 — STAKEHOLDERS ── */
  #slide-3{background:linear-gradient(135deg,var(--g3a) 0%,var(--g3b) 100%);}
  #slide-3::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 80%,rgba(139,92,246,.25) 0%,transparent 50%);pointer-events:none;}
  .b2b2c-diagram{display:flex;align-items:center;margin:10px 0 16px;}
  .b2b2c-node{flex:1;text-align:center;padding:11px 7px;border-radius:11px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);}
  .node-icon{font-size:18px;margin-bottom:4px;}
  .node-name{font-size:11px;font-weight:700;margin-bottom:2px;}
  .node-sub{font-size:9px;color:rgba(255,255,255,.55);line-height:1.3;}
  .b2b2c-node.highlight-node{background:rgba(96,165,250,.25);border-color:rgba(96,165,250,.5);}
  .b2b2c-arrow{flex-shrink:0;width:32px;text-align:center;color:var(--gold);font-size:14px;}
  .stakeholder-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .sh-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:9px;padding:10px;text-align:center;}
  .sh-icon{font-size:16px;margin-bottom:4px;}
  .sh-name{font-size:10px;font-weight:700;margin-bottom:2px;}
  .sh-role{font-size:9px;color:rgba(255,255,255,.5);line-height:1.3;}
  .pilot-box{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .pilot-icon{font-size:24px;}
  .pilot-label{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;}
  .pilot-name{font-size:14px;font-weight:700;color:var(--gold);}
  .pilot-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:2px;}

  /* ── SLIDE 4 — KPIs ── */
  #slide-4{background:linear-gradient(135deg,var(--g4a) 0%,var(--g4b) 100%);}
  #slide-4::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 25%,rgba(167,139,250,.3) 0%,transparent 55%);pointer-events:none;}
  .pn-versions{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .pn-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid transparent;font-size:11px;color:rgba(255,255,255,.5);}
  .pn-item.selected{background:rgba(96,165,250,.2);border-color:rgba(96,165,250,.4);color:rgba(255,255,255,.92);}
  .pn-badge{flex-shrink:0;font-size:9px;font-weight:800;padding:3px 8px;border-radius:5px;margin-top:1px;}
  .kpi-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .kpi-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:14px 16px;text-align:center;backdrop-filter:blur(4px);}
  .kpi-card.primary-kpi{background:rgba(96,165,250,.2);border-color:rgba(96,165,250,.45);}
  .kpi-icon{font-size:16px;margin-bottom:6px;}
  .kpi-value{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--gold);}
  .kpi-label{font-size:10px;color:rgba(255,255,255,.6);margin-top:3px;}
  .kpi-baseline{font-size:9px;color:rgba(255,255,255,.35);margin-top:4px;}
  .hypothesis-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .hyp-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:11px 13px;}
  .hyp-tag{font-size:9px;font-weight:800;color:#C4B5FD;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .hyp-text{font-size:11px;color:rgba(255,255,255,.8);line-height:1.5;}
  .hyp-metric{font-size:10px;color:var(--gold-light);margin-top:6px;font-weight:700;}

  /* ── SLIDE 5 — DADOS ── */
  #slide-5{background:linear-gradient(135deg,var(--g5a) 0%,var(--g5b) 100%);}
  #slide-5::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 70%,rgba(52,211,153,.2) 0%,transparent 50%);pointer-events:none;}

  /* ── SLIDE 6 — LACUNAS ── */
  #slide-6{background:linear-gradient(135deg,var(--g6a) 0%,var(--g6b) 100%);}
  #slide-6::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 30%,rgba(251,191,36,.2) 0%,transparent 50%);pointer-events:none;}
  .gap-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .gap-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:11px;color:rgba(255,255,255,.82);line-height:1.4;}
  .gap-ico{flex-shrink:0;margin-top:1px;font-size:12px;}
  .mitig-card{background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);border-radius:8px;padding:10px 13px;font-size:11px;color:rgba(255,255,255,.8);line-height:1.5;margin-top:6px;}
  .mitig-card strong{color:#6EE7B7;}

  /* ── SLIDE 7 — LGPD ── */
  #slide-7{background:linear-gradient(135deg,var(--g7a) 0%,var(--g7b) 100%);}
  #slide-7::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 30%,rgba(239,68,68,.3) 0%,transparent 50%);pointer-events:none;}
  .risk-matrix{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .risk-item{background:rgba(255,255,255,.09);border-radius:10px;padding:12px 14px;border:1px solid rgba(255,255,255,.14);}
  .risk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .risk-name{font-size:12px;font-weight:700;color:#fff;}
  .risk-chips{display:flex;gap:4px;}
  .risk-mitig{font-size:10px;color:rgba(255,255,255,.6);line-height:1.4;}
  .risk-mitig strong{color:#6EE7B7;font-weight:600;}
  .lgpd-principles{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
  .lgpd-p{background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);border-radius:9px;padding:10px;text-align:center;font-size:10px;color:rgba(255,255,255,.75);}
  .lgpd-icon{font-size:16px;margin-bottom:4px;}
  .lgpd-name{font-weight:800;color:#BAE6FD;display:block;margin-bottom:2px;}

  /* ── SLIDE 8 — SOLUÇÃO ── */
  #slide-8{background:linear-gradient(135deg,var(--g8a) 0%,var(--g8b) 100%);}
  #slide-8::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 60%,rgba(139,92,246,.25) 0%,transparent 55%);pointer-events:none;}
  .arch-layers{display:flex;flex-direction:column;gap:4px;}
  .arch-layer{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:11px;color:rgba(255,255,255,.8);}
  .al-icon{font-size:13px;flex-shrink:0;width:22px;text-align:center;}
  .al-name{font-weight:700;color:#fff;width:175px;flex-shrink:0;}
  .al-detail{color:rgba(255,255,255,.5);font-size:10px;}
  .why-not-ecac{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:12px 15px;}
  .why-not-title{font-size:10px;font-weight:800;color:#6EE7B7;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .why-row{display:flex;flex-wrap:wrap;gap:6px;}
  .why-chip{background:rgba(255,255,255,.1);border-radius:20px;padding:4px 10px;font-size:10px;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);}
  .ai-row{display:flex;flex-direction:column;gap:6px;margin-top:11px;}
  .ai-item{display:flex;align-items:center;gap:8px;font-size:11px;padding:7px 10px;background:rgba(255,255,255,.07);border-radius:6px;border:1px solid rgba(255,255,255,.1);}
  .ai-type{font-weight:700;width:100px;flex-shrink:0;}
  .ai-desc{color:rgba(255,255,255,.65);}

  /* ── SLIDE 9 — VALIDAÇÃO ── */
  #slide-9{background:linear-gradient(135deg,var(--g9a) 0%,var(--g9b) 100%);}
  #slide-9::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 70%,rgba(59,130,246,.25) 0%,transparent 50%);pointer-events:none;}
  .pilot-details{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
  .pilot-timeline{position:relative;padding-left:20px;}
  .pilot-timeline::before{content:'';position:absolute;left:4px;top:7px;bottom:7px;width:2px;background:rgba(255,255,255,.2);}
  .pt-item{position:relative;margin-bottom:12px;}
  .pt-item::before{content:'';position:absolute;left:-18px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--gold);border:2px solid transparent;}
  .pt-period{font-size:9px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:1px;}
  .pt-desc{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;line-height:1.4;}
  .success-criteria{display:flex;flex-direction:column;gap:8px;}
  .sc-item{display:flex;align-items:center;gap:11px;padding:10px 13px;background:rgba(255,255,255,.1);border-radius:9px;border:1px solid rgba(255,255,255,.18);}
  .sc-metric{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--gold);min-width:60px;}
  .sc-label{font-size:11px;color:rgba(255,255,255,.7);line-height:1.3;}
  .sc-label strong{color:#fff;display:block;margin-bottom:1px;}
  .demo-link-box{margin-top:12px;background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.4);border-radius:10px;padding:12px 15px;display:flex;align-items:center;gap:11px;}
  .dl-icon{font-size:18px;}
  .dl-text{font-size:11px;color:rgba(255,255,255,.75);}
  .dl-text strong{color:#DDD6FE;display:block;margin-bottom:2px;font-size:12px;}
  .demo-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
  .demo-link{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:#DDD6FE;background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.35);border-radius:20px;padding:3px 10px;text-decoration:none;transition:all .2s;}
  .demo-link:hover{background:rgba(139,92,246,.4);}

  /* ── SLIDE 10 — ROADMAP ── */
  #slide-10{background:linear-gradient(135deg,var(--g10a) 0%,var(--g10b) 100%);}
  #slide-10::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(52,211,153,.2) 0%,transparent 60%);pointer-events:none;}
  .roadmap-waves{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px;}

// ── NAVEGAÇÃO ────────────────────────────────────────────────────────
const TOTAL = 11;
let current = 1;
const dotsEl = document.getElementById('dots');
const counter = document.getElementById('counter');

for (let i = 1; i <= TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i === 1 ? ' active' : '');
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
}

function goTo(n) {
  if (n < 1 || n > TOTAL || n === current) return;
  document.getElementById('slide-' + current).classList.remove('active');
  document.getElementById('slide-' + current).classList.add('prev');
  setTimeout(() => {
    const p = document.getElementById('slide-' + (n < current ? n+1 : n-1));
    if (p) p.classList.remove('prev');
  }, 500);
  document.getElementById('slide-' + n).classList.add('active');
  current = n;
  updateNav();
}

function navigate(dir) { goTo(current + dir); }

function updateNav() {
  document.getElementById('btn-prev').disabled = current === 1;
  document.getElementById('btn-next').disabled = current === TOTAL;
  counter.textContent = current + ' / ' + TOTAL;
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i+1 === current));
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') navigate(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') navigate(-1);
  if (e.key==='Home') goTo(1);
  if (e.key==='End')  goTo(TOTAL);
});

let sx = 0;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
document.addEventListener('touchend',   e => { if (Math.abs(e.changedTouches[0].clientX - sx) > 50) navigate(e.changedTouches[0].clientX < sx ? 1 : -1); });
</script>
