<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Cultural | DestineAI</title>
  <link rel="icon" type="image/png" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/destineai.css">
  <style>
    :root {
      --primary-color: #0D1B3E;
      --secondary-color: #FFD700;
      --accent-color: #FFC000;
      --background-dark: #0D1B3E;
      --gradient-primary: linear-gradient(135deg, #0D1B3E 0%, #132247 100%);
    }
    .logo-text { font-size:22px;font-weight:700;letter-spacing:-0.5px;font-family:'Inter',sans-serif; }
    /* ─── HERO DO PROJETO ─── */
    .projeto-hero {
      position: relative;
      overflow: hidden;
    }

    .projeto-hero-bg {
      height: 280px;
      display: flex;
      align-items: flex-end;
      padding: 32px;
      position: relative;
    }

    .projeto-hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.65) 100%);
    }

    .projeto-hero-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -70%);
      font-size: 80px;
      opacity: 0.25;
      color: white;
      z-index: 1;
    }

    .projeto-hero-badge {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      color: white;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .projeto-hero-info {
      position: relative;
      z-index: 2;
      color: white;
      padding: 0 32px 32px;
      margin-top: -1px;
      background: linear-gradient(to bottom, transparent, rgba(22,78,99,1) 60%);
      padding-top: 40px;
    }

    .projeto-hero-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .projeto-hero-org {
      font-size: 14px;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ─── PROGRESSO GRANDE ─── */
    .projeto-progress-section {
      background: white;
      padding: 28px 32px;
      border-bottom: 1px solid #E8F4F8;
    }

    .projeto-progress-numbers {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .projeto-progress-raised {
      font-size: 28px;
      font-weight: 800;
      color: #164E63;
      font-family: 'Playfair Display', serif;
    }

    .projeto-progress-goal {
      font-size: 14px;
      color: #64748B;
    }

    .projeto-progress-bar-big {
      height: 12px;
      background: #E2E8F0;
      border-radius: 50px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .projeto-progress-bar-big .fill {
      height: 100%;
      background: linear-gradient(90deg, #F59E0B, #EA580C);
      border-radius: 50px;
      transition: width 1.5s ease;
    }

    .projeto-progress-meta {
      display: flex;
      gap: 24px;
      font-size: 13px;
      color: #64748B;
      flex-wrap: wrap;
    }

    .projeto-progress-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .projeto-progress-meta i {
      color: #0891B2;
    }

    /* ─── PROVA SOCIAL ─── */
    .social-proof-bar {
      background: linear-gradient(135deg, #F59E0B 0%, #EA580C 100%);
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .social-proof-text {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .social-proof-avatars {
      display: flex;
    }

    .social-proof-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-left: -8px;
      color: white;
    }

    .social-proof-avatar:first-child {
      margin-left: 0;
    }

    .social-proof-count {
      font-size: 15px;
      font-weight: 600;
    }

    .social-proof-count strong {
      font-size: 20px;
      font-weight: 800;
    }

    /* ─── LAYOUT PRINCIPAL ─── */
    .projeto-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    @media (max-width: 900px) {
      .projeto-layout {
        grid-template-columns: 1fr;
      }
      .projeto-sidebar {
        order: -1;
      }
    }

    /* ─── SIDEBAR CTA ─── */
    .projeto-sidebar-sticky {
      position: sticky;
      top: 80px;
    }

    .sidebar-cta-card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(22,78,99,0.14);
      padding: 28px;
      border: 1px solid #E8F4F8;
    }

    .sidebar-cta-card h3 {
      font-family: 'Playfair Display', serif;
      color: #164E63;
      font-size: 20px;
      margin-bottom: 6px;
    }

    .sidebar-cta-card p {
      color: #64748B;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .sidebar-amount-input {
      background: #F0F9FF;
      border: 2px solid #BAE6FD;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sidebar-amount-input span {
      font-size: 18px;
      font-weight: 700;
      color: #164E63;
    }

    .sidebar-amount-input input {
      border: none;
      background: transparent;
      font-size: 24px;
      font-weight: 800;
      color: #164E63;
      width: 100%;
      outline: none;
      font-family: 'Playfair Display', serif;
    }

    .sidebar-quick-amounts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .quick-amount-btn {
      background: #F0F9FF;
      border: 2px solid #BAE6FD;
      color: #164E63;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-amount-btn:hover,
    .quick-amount-btn.active {
      background: #164E63;
      border-color: #164E63;
      color: white;
    }

    .sidebar-ir-note {
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: #065F46;
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    /* ─── CONTEÚDO PRINCIPAL ─── */
    .projeto-section {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(22,78,99,0.08);
      border: 1px solid #E8F4F8;
      margin-bottom: 20px;
    }

    .projeto-section-title {
      font-size: 16px;
      font-weight: 700;
      color: #164E63;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .projeto-section-title i {
      color: #F59E0B;
    }

    /* Galeria de fotos */
    .foto-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .foto-placeholder {
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .foto-placeholder:hover {
      transform: scale(1.03);
    }

    .foto-placeholder.foto-1 { background: linear-gradient(135deg, #6B21A8, #A855F7); }
    .foto-placeholder.foto-2 { background: linear-gradient(135deg, #0369A1, #38BDF8); }
    .foto-placeholder.foto-3 { background: linear-gradient(135deg, #065F46, #34D399); }
    .foto-placeholder.foto-4 { background: linear-gradient(135deg, #92400E, #F59E0B); }
    .foto-placeholder.foto-5 { background: linear-gradient(135deg, #9F1239, #F43F5E); }
    .foto-placeholder.foto-6 { background: linear-gradient(135deg, #1E3A5F, #0891B2); }

    /* Linha do tempo */
    .projeto-timeline {
      position: relative;
      padding-left: 28px;
    }

    .projeto-timeline::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, #0891B2, #E2E8F0);
    }

    .projeto-timeline-item {
      position: relative;
      margin-bottom: 24px;
    }

    .projeto-timeline-item:last-child {
      margin-bottom: 0;
    }

    .projeto-timeline-dot {
      position: absolute;
      left: -34px;
      top: 4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #0891B2;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
    }

    .projeto-timeline-date {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #0891B2;
      margin-bottom: 4px;
    }

    .projeto-timeline-item h4 {
      font-size: 14px;
      font-weight: 600;
      color: #0F172A;
      margin-bottom: 3px;
    }

    .projeto-timeline-item p {
      font-size: 13px;
      color: #64748B;
      margin: 0;
      line-height: 1.5;
    }

    /* Orçamento breakdown */
    .orcamento-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .orcamento-item {
      background: #F8FAFC;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .orcamento-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #164E63, #0891B2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }

    .orcamento-label {
      font-size: 12px;
      color: #64748B;
      margin-bottom: 2px;
    }

    .orcamento-value {
      font-size: 16px;
      font-weight: 700;
      color: #164E63;
    }

    .orcamento-pct {
      font-size: 11px;
      color: #F59E0B;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .projeto-hero-bg { height: 200px; }
      .foto-gallery { grid-template-columns: repeat(2, 1fr); }
      .orcamento-grid { grid-template-columns: 1fr; }
      .social-proof-bar { flex-direction: column; gap: 12px; }
      .projeto-progress-section { padding: 20px 16px; }
    }

    /* ─── Botões e CTA (anteriormente em incentivabr-theme.css) ─── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: 10px; font-weight: 600;
      font-size: 14px; text-decoration: none; cursor: pointer;
      border: 2px solid transparent; transition: all 0.2s; white-space: nowrap;
    }
    .btn-primary { background: #FFD700; color: #0D1B3E; border-color: #FFD700; }
    .btn-primary:hover { background: #FFC000; border-color: #FFC000; }
    .btn-white { background: white; color: #0D1B3E; }
    .btn-white:hover { background: #f5f5f5; }
    .btn-outline { background: transparent; color: #0D1B3E; border-color: #0D1B3E; }
    .btn-outline:hover { background: #0D1B3E; color: white; }
    .btn-outline-white { background: transparent; color: white; border-color: rgba(255,255,255,0.5); }
    .btn-outline-white:hover { background: rgba(255,255,255,0.12); }
    .btn-block { width: 100%; justify-content: center; margin-bottom: 8px; }
    .cta { background: linear-gradient(135deg, #0D1B3E 0%, #132247 100%); color: white; text-align: center; padding: 60px 24px; }
    .cta h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    .cta p { font-size: 16px; opacity: 0.8; margin-bottom: 28px; }
    .cta-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>


  <!-- Conteúdo principal - carregado via JS -->
  <div id="projetoContent">
    <div style="text-align:center;padding:80px 20px">
      <i class="fas fa-spinner fa-spin" style="font-size:40px;color:#0891B2"></i>
      <p style="margin-top:16px;color:#64748B">Carregando projeto...</p>
    </div>
  </div>


  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>Layout.init('projeto');</script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // Pegar PRONAC da URL
    const params = new URLSearchParams(window.location.search);
    const pronac = params.get('pronac');

    // Cores de categoria
    const categoryColors = {
      'teatro': 'linear-gradient(135deg, #6B21A8 0%, #A855F7 100%)',
      'música': 'linear-gradient(135deg, #0369A1 0%, #38BDF8 100%)',
      'musica': 'linear-gradient(135deg, #0369A1 0%, #38BDF8 100%)',
      'cinema': 'linear-gradient(135deg, #9F1239 0%, #F43F5E 100%)',
      'dança': 'linear-gradient(135deg, #92400E 0%, #F59E0B 100%)',
      'danca': 'linear-gradient(135deg, #92400E 0%, #F59E0B 100%)',
      'artes': 'linear-gradient(135deg, #065F46 0%, #34D399 100%)',
      'default': 'linear-gradient(135deg, #164E63 0%, #0891B2 100%)'
    };

    function getCategoryColor(segmento) {
      const s = (segmento || '').toLowerCase();
      for (const key of Object.keys(categoryColors)) {
        if (s.includes(key)) return categoryColors[key];
      }
      return categoryColors.default;
    }

    function getCategoryIcon(segmento) {
      const s = (segmento || '').toLowerCase();
      if (s.includes('música') || s.includes('musica')) return 'fa-music';
      if (s.includes('cinema') || s.includes('audiovisual')) return 'fa-film';
      if (s.includes('dança') || s.includes('danca')) return 'fa-person-dancing';
      if (s.includes('arte')) return 'fa-paint-brush';
      return 'fa-theater-masks';
    }

    // Dados fixos para PRONAC 261847 (Orquestra das Periferias — piloto FGV)
    const DEMO_PROJETOS = {
      '261847': {
        titulo: 'Orquestra das Periferias do DF — Temporada 2026',
        segmento: 'Apresentação/Gravação de Música Erudita',
        area: 'Música',
        uf: 'DF',
        municipio: 'Ceilândia / Samambaia / Santa Maria',
        proponente: { razao_social: 'Associação Cultural Orquestra das Periferias do DF', uf: 'DF' },
        valor_aprovado: 520000,
        valor_captado: 91000,
        descricao: 'Formação orquestral contínua para 80 jovens de 14 a 24 anos das regiões administrativas de Ceilândia, Samambaia e Santa Maria. O programa oferece ensaios semanais, masterclasses com músicos profissionais, 6 concertos públicos gratuitos e gravação audiovisual da temporada.\n\nArt. 18 (FNC) — 100% dedutível do Imposto de Renda. PRONAC 261847.',
        mecanismo: 'Art. 18 — FNC',
        art18: true,
        updates: [
          {
            date: 'Abril 2026',
            icon: 'fa-music',
            title: 'Turma 2026 selecionada',
            desc: '80 jovens de Ceilândia, Samambaia e Santa Maria passaram pela audição. Ensaios semanais iniciados no Galpão Cultural de Ceilândia.'
          },
          {
            date: 'Março 2026',
            icon: 'fa-check-circle',
            title: 'Captação aprovada pelo MinC',
            desc: 'PRONAC 261847 habilitado no SALIC. Banco do Brasil confirmado como agente financeiro. Captação aberta para servidores via Art. 18.'
          },
          {
            date: 'Janeiro 2026',
            icon: 'fa-clipboard-check',
            title: 'Plano de trabalho aprovado',
            desc: 'Plano pedagógico e orçamento aprovados pelo Ministério da Cultura. 6 concertos públicos previstos entre junho e novembro de 2026.'
          }
        ],
        orcamento: [
          { icon: 'fa-violin', label: 'Instrumentos e manutenção', pct: '35%', value: 182000 },
          { icon: 'fa-chalkboard-teacher', label: 'Professores e masterclasses', pct: '30%', value: 156000 },
          { icon: 'fa-microphone', label: 'Concertos e gravação', pct: '25%', value: 130000 },
          { icon: 'fa-bullhorn', label: 'Comunicação e documentação', pct: '10%', value: 52000 },
        ],
        cadeiras: { total: 40, apoiadas: 7 }
      }
    };

    // Atualizações demo por segmento
    function getDemoUpdates(titulo, segmento) {
      return [
        {
          date: 'Março 2025',
          icon: 'fa-star',
          title: 'Projeto em plena execução',
          desc: 'O projeto está em execução com ótimos resultados. A equipe agradece o apoio de todos os contribuintes via DestineAI.'
        },
        {
          date: 'Janeiro 2025',
          icon: 'fa-check-circle',
          title: 'Captação aprovada pelo MinC',
          desc: 'O projeto recebeu aprovação do Ministério da Cultura para iniciar a captação oficial via Lei Rouanet.'
        },
        {
          date: 'Dezembro 2024',
          icon: 'fa-clipboard-check',
          title: 'Plano de trabalho aprovado',
          desc: 'O plano de trabalho detalhado foi submetido ao SALIC e aprovado, permitindo o início das atividades de captação.'
        }
      ];
    }

    // Breakdown orçamento demo
    function getOrcamentoItems(totalMeta) {
      return [
        { icon: 'fa-palette', label: 'Produção artística', pct: '40%', value: totalMeta * 0.40 },
        { icon: 'fa-users', label: 'Equipe e cachês', pct: '35%', value: totalMeta * 0.35 },
        { icon: 'fa-truck', label: 'Logística', pct: '15%', value: totalMeta * 0.15 },
        { icon: 'fa-bullhorn', label: 'Comunicação', pct: '10%', value: totalMeta * 0.10 },
      ];
    }

    function formatBRL(value) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
    }

    function renderProjeto(projeto) {
      const titulo = projeto.titulo || projeto.nome || 'Projeto Cultural';
      const segmento = projeto.segmento || projeto.area || '';
      const proponente = projeto.proponente?.nome_fantasia || projeto.proponente?.razao_social || projeto.responsavel || '';
      const uf = projeto.uf || projeto.proponente?.uf || '';
      const cidade = projeto.municipio || projeto.cidade || '';
      const local = [cidade, uf].filter(Boolean).join(', ');

      const isOrquestra = pronac === '261847';
      const demoCaptado = projeto.valor_captado || 0;
      const totalMeta = parseFloat(projeto.valor_aprovado || projeto.valor_projeto || 500000);
      const totalArrecadado = demoCaptado || totalMeta * 0.175;
      const progresso = Math.min(Math.round((totalArrecadado / totalMeta) * 100), 100);
      const totalContribuintes = isOrquestra ? 7 : (Math.floor(Math.random() * 80) + 40);

      const bgColor = getCategoryColor(segmento);
      const icon = getCategoryIcon(segmento);
      const updates = projeto.updates || getDemoUpdates(titulo, segmento);
      const orcamento = projeto.orcamento || getOrcamentoItems(totalMeta);
      const cadeiras = projeto.cadeiras || null;

      // Avatares de prova social (iniciais demo)
      const avatarLetters = ['MF', 'AS', 'RC', 'JL', 'PB'];

      document.title = `${titulo} | DestineAI`;

      document.getElementById('projetoContent').innerHTML = `
        <!-- HERO -->
        <div class="projeto-hero">
          <div class="projeto-hero-bg" style="background:${isOrquestra ? 'linear-gradient(135deg,#0D1B3E 0%,#1a2f5a 50%,#0f3460 100%)' : bgColor}">
            ${isOrquestra
              ? `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0.12;font-size:100px;color:white">🎻</div>`
              : `<i class="fas ${icon} projeto-hero-icon"></i>`
            }
            <div style="position:relative;z-index:2;display:flex;gap:8px;flex-wrap:wrap">
              <span class="projeto-hero-badge"><i class="fas ${icon}"></i> ${segmento || 'Projeto Cultural'}</span>
              ${isOrquestra ? `<span class="projeto-hero-badge" style="background:rgba(255,215,0,0.25);color:#FFD700;border:1px solid rgba(255,215,0,0.4)"><i class="fas fa-star"></i> Art. 18 — 100% dedutível</span>` : ''}
            </div>
          </div>
          <div class="projeto-hero-info" style="background:linear-gradient(to bottom, transparent, ${isOrquestra ? '#0D1B3E' : '#164E63'} 60%)">
            <h1>${titulo}</h1>
            <div class="projeto-hero-org">
              ${proponente ? `<i class="fas fa-building"></i> ${proponente}` : ''}
              ${local ? `<span>·</span><i class="fas fa-map-marker-alt"></i> ${local}` : ''}

    function renderError(msg) {
      document.getElementById('projetoContent').innerHTML = `

          <a href="projetos-rouanet.html" class="btn btn-primary">
            <i class="fas fa-search"></i> Explorar projetos
          </a>
        </div>
      `;
    }

    function setAmount(val) {
      document.getElementById('sidebarAmount').value = val;
      updateAmountDisplay();
      document.querySelectorAll('.quick-amount-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }

    function updateAmountDisplay() {
      const val = parseFloat(document.getElementById('sidebarAmount')?.value || 500);
      const formatted = val.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
      const el = document.getElementById('sidebarAmountDisplay');
      if (el) el.textContent = formatted;
    }

    // Normaliza dados do org-project (estrutura SALIC) para o formato de renderProjeto
    function normalizeOrgProject(data) {
      const p = data.projeto || {};
      const o = data.organizacao || {};
      const local = DEMO_PROJETOS[p.pronac] || {};
      return {
        pronac:        p.pronac,
        titulo:        local.titulo || p.nome,
        nome:          p.nome,
        segmento:      local.segmento || p.segmento,
        area:          local.area     || p.area,
        uf:            local.uf       || p.uf,
        municipio:     local.municipio || p.municipio,
        situacao:      p.situacao,
        proponente:    { razao_social: p.proponente?.nome },
        valor_aprovado: p.valores?.aprovado || local.valor_aprovado,
        valor_captado:  p.valores?.captado  || local.valor_captado,
        descricao:     local.descricao || p.objetivos || p.resumo || '',
        mecanismo:     local.mecanismo || p.mecanismo || '',
        art18:         local.art18 || false,
        updates:       local.updates,
        orcamento:     local.orcamento,
        cadeiras:      local.cadeiras
      };
    }

    function afterRender() {
      setTimeout(() => {
        const input = document.getElementById('sidebarAmount');
        if (input) input.addEventListener('input', updateAmountDisplay);
        buildDetalheCadeiras();
      }, 100);
    }

    // Carregar projeto:
    //  1. org-project (banco — correto para white-label e simulação)
    //  2. DEMO_PROJETOS (fallback offline com conteúdo narrativo rico)
    //  3. SALIC direto (para qualquer outro PRONAC real)
    async function loadProjeto() {
      if (!pronac) {
        renderError('Nenhum PRONAC informado na URL.');
        return;
      }

      // 1 — Tentar dados do banco via org-project
      try {
        const res = await fetch('/api/salic/org-project');
        if (res.ok) {
          const data = await res.json();
          if (data.status === 'success' && data.projeto?.pronac === pronac) {
            renderProjeto(normalizeOrgProject(data));
            afterRender();
            return;
          }
        }
      } catch (e) { /* sem banco ou org não configurada — continuar */ }

      // 2 — Dados locais (narrativa rica para PRONACs conhecidos)
      if (DEMO_PROJETOS[pronac]) {
        renderProjeto(DEMO_PROJETOS[pronac]);
        afterRender();
        return;
      }

      // 3 — SALIC direto (projetos reais não configurados no banco)
      try {
        const res = await fetch(`/api/salic/projetos/${pronac}`);
        if (!res.ok) throw new Error('Projeto não encontrado');
        const data = await res.json();
        renderProjeto(data.projeto || data);
        afterRender();
      } catch (err) {
        renderError(err.message);
      }
    }

      for (let i = 1; i <= 40; i++) {
        const ap = APOIADAS.includes(i);
        const div = document.createElement('div');
        div.style.cssText = `
          aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;
          align-items:center;justify-content:center;font-size:9px;font-weight:700;
          gap:2px;cursor:default;transition:transform .15s;
          background:${ap ? 'rgba(255,215,0,0.8)' : 'rgba(255,255,255,0.1)'};
          color:${ap ? '#0D1B3E' : 'rgba(255,255,255,0.4)'};
          border:1px solid ${ap ? 'rgba(255,215,0,0.9)' : 'rgba(255,255,255,0.2)'};
        `;
        div.innerHTML = icon + `<span>${i}</span>`;
        grid.appendChild(div);
      }
    }

    loadProjeto();
  </script>
  <script src="js/tenant.js"></script>
<script src="js/tina.js"></script>
</body>
