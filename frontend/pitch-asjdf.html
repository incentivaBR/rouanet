<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DestineAI × ASJDF — Pitch FGV MBA 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* ── PALETA ─────────────────────────────────────────────────── */
  :root{
    --gold:#FBBF24; --gold-light:#FDE68A;
    --white:#FFFFFF;
    /* Slide gradients — ASJDF edition */
    --g1a:#0D1B2A; --g1b:#1A237E;   /* capa: navy profundo → azul real */
    --g2a:#1a0a0a; --g2b:#7f1d1d;   /* dor: preto-carmim → vinho */
    --g3a:#064e3b; --g3b:#065f46;   /* decisão: verde esmeralda */
    --g4a:#1e1b4b; --g4b:#4c1d95;   /* pergunta/KPIs: índigo → violeta */
    --g5a:#134e4a; --g5b:#0f766e;   /* dados: teal escuro */
    --g6a:#1e293b; --g6b:#334155;   /* lacunas: slate */
    --g7a:#3b0764; --g7b:#581c87;   /* lgpd: púrpura profundo */
    --g8a:#78350f; --g8b:#92400e;   /* solução: âmbar/dourado */
    --g9a:#1e3a5f; --g9b:#1e40af;   /* validação: azul confiante */
    --g10a:#064e3b;--g10b:#065f46;  /* roadmap: verde crescimento */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;color:#fff;overflow:hidden;height:100vh;width:100vw;}
  .deck{width:100vw;height:100vh;position:relative;}

  /* ── SLIDES ── */
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .45s ease,transform .45s ease;transform:translateX(36px);overflow:hidden;}
  .slide.active{opacity:1;pointer-events:all;transform:translateX(0);}
  .slide.prev{opacity:0;transform:translateX(-36px);}

  /* ── NAV ── */
  .nav-bar{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.35);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:9px 18px;z-index:1000;}
  .nav-bar button{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;padding:3px 7px;border-radius:7px;transition:all .2s;}
  .nav-bar button:hover{color:#fff;background:rgba(255,255,255,.15);}
  .nav-bar button:disabled{opacity:.2;cursor:default;}
  .nav-dots{display:flex;gap:6px;align-items:center;}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .3s;}
  .nav-dot.active{background:var(--gold);width:18px;border-radius:3px;}
  .slide-counter{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);min-width:36px;text-align:center;}
  .nav-badge{font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);border-radius:20px;padding:3px 10px;white-space:nowrap;}

  /* ── TAGS ── */
  .slide-tag{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:4px 13px;border-radius:20px;margin-bottom:14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);backdrop-filter:blur(4px);}

  /* ── TIPOGRAFIA ── */
  .slide-h2{font-family:'Playfair Display',serif;font-size:clamp(28px,3vw,42px);font-weight:700;line-height:1.2;margin-bottom:10px;}
  .slide-lead{font-size:clamp(15px,1.3vw,19px);color:rgba(255,255,255,.80);line-height:1.6;max-width:640px;}
  em.hl{color:var(--gold);font-style:normal;font-weight:700;}
  em.hl-blue{color:#BAE6FD;font-style:normal;font-weight:700;}
  em.hl-green{color:#BBF7D0;font-style:normal;font-weight:700;}
  em.hl-red{color:#FCA5A5;font-style:normal;font-weight:700;}

  /* ── CARDS ── */
  .card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:22px 26px;backdrop-filter:blur(6px);}
  .card-accent-gold{border-left:4px solid var(--gold);}
  .card-accent-blue{border-left:4px solid #60A5FA;}
  .card-accent-green{border-left:4px solid #34D399;}
  .gap-section-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px;}

  /* ── STATS ── */
  .stat-row{display:flex;gap:14px;flex-wrap:wrap;}
  .stat-item{flex:1;min-width:100px;background:rgba(255,255,255,.12);border-radius:14px;padding:16px 18px;border:1px solid rgba(255,255,255,.2);}
  .stat-n{font-family:'Playfair Display',serif;font-size:clamp(36px,3.2vw,56px);font-weight:700;color:var(--gold);line-height:1;}
  .stat-label{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;}

  /* ── BADGES ── */
  .badge{display:inline-block;padding:3px 10px;border-radius:9px;font-size:10px;font-weight:700;}
  .badge-gold{background:rgba(251,191,36,.25);color:#FDE68A;}
  .badge-green{background:rgba(52,211,153,.2);color:#A7F3D0;}
  .badge-red{background:rgba(239,68,68,.25);color:#FCA5A5;}
  .badge-blue{background:rgba(96,165,250,.2);color:#BFDBFE;}
  .badge-purple{background:rgba(167,139,250,.2);color:#DDD6FE;}
  .badge-gray{background:rgba(255,255,255,.1);color:rgba(255,255,255,.55);}

  /* ── DATA CARDS (slide 5) ── */
  .data-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .data-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:20px 22px;backdrop-filter:blur(6px);}
  .dc-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:6px;}
  .dc-badge-row{margin-bottom:8px;}
  .dc-uso{font-size:13px;color:rgba(255,255,255,.7);line-height:1.5;}

  /* ── LAYOUT ── */
  .slide-inner{flex:1;display:flex;flex-direction:column;padding:clamp(18px,2.5vh,38px) clamp(28px,4.5vw,80px) 72px;max-width:1280px;margin:0 auto;width:100%;overflow:hidden;position:relative;z-index:1;}
  .slide-inner.wide{max-width:1420px;}
  .slide-header{margin-bottom:16px;}
  .slide-content{flex:1;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
  .key-hint{position:fixed;top:16px;right:20px;font-size:10px;color:rgba(255,255,255,.25);display:flex;align-items:center;gap:6px;z-index:999;}
  .key-hint kbd{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:2px 7px;font-size:10px;color:rgba(255,255,255,.35);}

  /* ── DIVISOR ── */
  .section-divider{height:1px;background:rgba(255,255,255,.12);margin:14px 0;}

  /* ── SLIDE 1 — CAPA ── */
  #slide-1{background:linear-gradient(135deg,var(--g1a) 0%,var(--g1b) 100%);justify-content:center;align-items:center;text-align:center;}
  #slide-1::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 35%,rgba(26,35,126,.5) 0%,transparent 60%),radial-gradient(ellipse at 15% 75%,rgba(59,130,246,.3) 0%,transparent 50%);pointer-events:none;}
  .cover-top{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:24px;}
  .cover-logo{font-size:12px;font-weight:800;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
  .cover-h1{font-family:'Playfair Display',serif;font-size:clamp(36px,4.5vw,62px);font-weight:800;line-height:1.1;margin-bottom:22px;max-width:820px;position:relative;}
  .cover-sub{display:inline-block;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);padding:6px 18px;border-radius:30px;margin-bottom:18px;position:relative;}
  .cover-meta{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;position:relative;}
  .cover-meta-item{font-size:12px;color:rgba(255,255,255,.45);}
  .cover-meta-item strong{display:block;font-size:13px;color:rgba(255,255,255,.85);margin-bottom:1px;}
  .cover-float{position:absolute;inset:0;pointer-events:none;}
  .float-card{position:absolute;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:12px 18px;backdrop-filter:blur(12px);font-size:13px;font-weight:600;}
  .fc1{top:16%;left:3%;}  .fc2{top:20%;right:3%;}  .fc3{bottom:20%;left:4%;}  .fc4{bottom:20%;right:4%;}

  /* ── SLIDE 2 — DOR ── */
  #slide-2{background:linear-gradient(135deg,var(--g2a) 0%,var(--g2b) 100%);}
  #slide-2::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 15%,rgba(239,68,68,.35) 0%,transparent 55%);pointer-events:none;}
  .dor-main{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
  .big-number{font-family:'Playfair Display',serif;font-size:clamp(52px,5.5vw,80px);font-weight:800;color:var(--gold);line-height:1;}
  .big-label{font-size:14px;color:rgba(255,255,255,.7);margin-top:6px;max-width:280px;line-height:1.5;}
  .dor-quote{margin-top:18px;padding:16px 20px;background:rgba(239,68,68,.2);border-left:4px solid #F87171;border-radius:0 12px 12px 0;font-size:13px;font-style:italic;color:rgba(255,255,255,.9);line-height:1.6;}
  .barriers{display:flex;flex-direction:column;gap:8px;}
  .barrier-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:rgba(255,255,255,.1);border-radius:12px;border:1px solid rgba(255,255,255,.18);font-size:14px;color:rgba(255,255,255,.92);}
  .b-num{width:26px;height:26px;border-radius:50%;background:rgba(239,68,68,.4);color:#FCA5A5;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  /* ── SLIDE 3 — STAKEHOLDERS ── */
  #slide-3{background:linear-gradient(135deg,var(--g3a) 0%,var(--g3b) 100%);}
  #slide-3::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 80%,rgba(52,211,153,.2) 0%,transparent 50%);pointer-events:none;}
  .b2b2c-diagram{display:flex;align-items:center;margin:10px 0 18px;}
  .b2b2c-node{flex:1;text-align:center;padding:14px 9px;border-radius:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);}
  .node-icon{font-size:22px;margin-bottom:5px;}
  .node-name{font-size:13px;font-weight:700;margin-bottom:3px;}
  .node-sub{font-size:10px;color:rgba(255,255,255,.55);line-height:1.4;}
  .b2b2c-node.highlight-node{background:rgba(96,165,250,.25);border-color:rgba(96,165,250,.5);}
  .b2b2c-arrow{flex-shrink:0;width:32px;text-align:center;color:var(--gold);font-size:16px;}
  .stakeholder-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sh-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:13px;text-align:center;}
  .sh-icon{font-size:18px;margin-bottom:5px;}
  .sh-name{font-size:11px;font-weight:700;margin-bottom:3px;}
  .sh-role{font-size:10px;color:rgba(255,255,255,.5);line-height:1.4;}
  .pilot-box{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .pilot-icon{font-size:28px;}
  .pilot-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;}
  .pilot-name{font-size:15px;font-weight:700;color:var(--gold);}
  .pilot-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:3px;}

  /* ── SLIDE 4 — KPIs ── */
  #slide-4{background:linear-gradient(135deg,var(--g4a) 0%,var(--g4b) 100%);}
  #slide-4::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 25%,rgba(167,139,250,.3) 0%,transparent 55%);pointer-events:none;}
  .pn-versions{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .pn-item{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-radius:10px;border:1px solid transparent;font-size:13px;line-height:1.4;color:rgba(255,255,255,.5);overflow:hidden;}
  .pn-item.selected{background:rgba(96,165,250,.2);border-color:rgba(96,165,250,.4);color:rgba(255,255,255,.95);font-size:14px;}
  .pn-badge{flex-shrink:0;font-size:10px;font-weight:800;padding:4px 10px;border-radius:6px;margin-top:2px;white-space:nowrap;}
  .kpi-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .kpi-card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:20px 18px;text-align:center;backdrop-filter:blur(4px);}
  .kpi-card.primary-kpi{background:rgba(96,165,250,.2);border-color:rgba(96,165,250,.45);}
  .kpi-icon{font-size:20px;margin-bottom:8px;}
  .kpi-value{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;color:var(--gold);}
  .kpi-label{font-size:12px;color:rgba(255,255,255,.7);margin-top:5px;}
  .kpi-baseline{font-size:10px;color:rgba(255,255,255,.38);margin-top:5px;}
  .hypothesis-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
  .hyp-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:16px 18px;}
  .hyp-tag{font-size:10px;font-weight:800;color:#C4B5FD;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
  .hyp-text{font-size:13px;color:rgba(255,255,255,.85);line-height:1.55;}
  .hyp-metric{font-size:12px;color:var(--gold-light);margin-top:8px;font-weight:700;}

  /* ── SLIDE 5 — DADOS ── */
  #slide-5{background:linear-gradient(135deg,var(--g5a) 0%,var(--g5b) 100%);}
  #slide-5::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 70%,rgba(52,211,153,.2) 0%,transparent 50%);pointer-events:none;}

  /* ── SLIDE 6 — LACUNAS ── */
  #slide-6{background:linear-gradient(135deg,var(--g6a) 0%,var(--g6b) 100%);}
  #slide-6::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 30%,rgba(96,165,250,.15) 0%,transparent 50%);pointer-events:none;}
  .gap-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .gap-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:rgba(255,255,255,.85);line-height:1.5;}
  .gap-ico{flex-shrink:0;margin-top:2px;font-size:14px;}
  .mitig-card{background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);border-radius:12px;padding:14px 16px;font-size:13px;color:rgba(255,255,255,.85);line-height:1.55;margin-top:8px;}
  .mitig-card strong{color:#6EE7B7;}

  /* ── SLIDE 7 — LGPD ── */
  #slide-7{background:linear-gradient(135deg,var(--g7a) 0%,var(--g7b) 100%);}
  #slide-7::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 30%,rgba(139,92,246,.3) 0%,transparent 50%);pointer-events:none;}
  .risk-matrix{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .risk-item{background:rgba(255,255,255,.09);border-radius:14px;padding:18px 20px;border:1px solid rgba(255,255,255,.14);}
  .risk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .risk-name{font-size:13px;font-weight:700;color:#fff;}
  .risk-chips{display:flex;gap:5px;}
  .risk-mitig{font-size:12px;color:rgba(255,255,255,.65);line-height:1.5;}
  .risk-mitig strong{color:#6EE7B7;font-weight:600;}
  .lgpd-principles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;}
  .lgpd-p{background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);border-radius:12px;padding:14px;text-align:center;font-size:11px;color:rgba(255,255,255,.8);}
  .lgpd-icon{font-size:20px;margin-bottom:6px;}
  .lgpd-name{font-weight:800;color:#BAE6FD;display:block;margin-bottom:3px;}

  /* ── SLIDE 8 — SOLUÇÃO ── */
  #slide-8{background:linear-gradient(135deg,var(--g8a) 0%,var(--g8b) 100%);}
  #slide-8::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 60%,rgba(251,191,36,.15) 0%,transparent 55%);pointer-events:none;}
  .arch-layers{display:flex;flex-direction:column;gap:6px;}
  .arch-layer{display:flex;align-items:center;gap:12px;padding:10px 15px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:13px;color:rgba(255,255,255,.85);}
  .al-icon{font-size:15px;flex-shrink:0;width:24px;text-align:center;}
  .al-name{font-weight:700;color:#fff;width:190px;flex-shrink:0;}
  .al-detail{color:rgba(255,255,255,.55);font-size:12px;}
  .why-not-ecac{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);border-radius:14px;padding:16px 18px;}
  .why-not-title{font-size:11px;font-weight:800;color:#6EE7B7;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
  .why-row{display:flex;flex-wrap:wrap;gap:7px;}
  .why-chip{background:rgba(255,255,255,.1);border-radius:20px;padding:5px 12px;font-size:11px;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.18);}
  .ai-row{display:flex;flex-direction:column;gap:8px;margin-top:13px;}
  .ai-item{display:flex;align-items:center;gap:10px;font-size:13px;padding:11px 14px;background:rgba(255,255,255,.07);border-radius:10px;border:1px solid rgba(255,255,255,.12);}
  .ai-type{font-weight:700;width:110px;flex-shrink:0;font-size:14px;}
  .ai-desc{color:rgba(255,255,255,.7);}
  .asjdf-receives{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;}
  .asjdf-rec-item{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);border-radius:12px;padding:13px 15px;font-size:13px;color:rgba(255,255,255,.9);line-height:1.5;}

  /* ── SLIDE 9 — VALIDAÇÃO ── */
  #slide-9{background:linear-gradient(135deg,var(--g9a) 0%,var(--g9b) 100%);}
  #slide-9::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 70%,rgba(59,130,246,.25) 0%,transparent 50%);pointer-events:none;}
  .pilot-details{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;}
  .pilot-timeline{position:relative;padding-left:22px;}
  .pilot-timeline::before{content:'';position:absolute;left:5px;top:7px;bottom:7px;width:2px;background:rgba(255,255,255,.2);}
  .pt-item{position:relative;margin-bottom:14px;}
  .pt-item::before{content:'';position:absolute;left:-19px;top:6px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid transparent;}
  .pt-period{font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:1px;}
  .pt-desc{font-size:13px;color:rgba(255,255,255,.78);margin-top:3px;line-height:1.45;}
  .success-criteria{display:flex;flex-direction:column;gap:10px;}
  .sc-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(255,255,255,.1);border-radius:12px;border:1px solid rgba(255,255,255,.18);}
  .sc-metric{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);min-width:68px;}
  .sc-label{font-size:13px;color:rgba(255,255,255,.75);line-height:1.4;}
  .sc-label strong{color:#fff;display:block;margin-bottom:2px;}
  .demo-link-box{margin-top:14px;background:rgba(30,64,175,.25);border:1px solid rgba(96,165,250,.35);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:13px;}
  .dl-icon{font-size:22px;}
  .dl-text{font-size:13px;color:rgba(255,255,255,.8);}
  .dl-text strong{color:#BAE6FD;display:block;margin-bottom:3px;font-size:14px;}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────────────
const TOTAL = 10;
let current = 1;
const dotsEl = document.getElementById('dots');
const counter = document.getElementById('counter');

for (let i = 1; i <= TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'nav-dot' + (i === 1 ? ' active' : '');
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
}

function goTo(n) {
  if (n < 1 || n > TOTAL || n === current) return;
  document.getElementById('slide-' + current).classList.remove('active');
  document.getElementById('slide-' + current).classList.add('prev');
  setTimeout(() => {
    const p = document.getElementById('slide-' + (n < current ? n+1 : n-1));
    if (p) p.classList.remove('prev');
  }, 500);
  document.getElementById('slide-' + n).classList.add('active');
  current = n;
  updateNav();
}

function navigate(dir) { goTo(current + dir); }

function updateNav() {
  document.getElementById('btn-prev').disabled = current === 1;
  document.getElementById('btn-next').disabled = current === TOTAL;
  counter.textContent = current + ' / ' + TOTAL;
  document.querySelectorAll('.nav-dot').forEach((d, i) => d.classList.toggle('active', i+1 === current));
}

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') navigate(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') navigate(-1);
  if (e.key==='Home') goTo(1);
  if (e.key==='End')  goTo(TOTAL);
});

let sx = 0;
document.addEventListener('touchstart', e => { sx = e.touches[0].clientX; });
document.addEventListener('touchend',   e => { if (Math.abs(e.changedTouches[0].clientX - sx) > 50) navigate(e.changedTouches[0].clientX < sx ? 1 : -1); });
</script>
